<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0b2e"/>
      <stop offset="1" stop-color="#0a0a1f"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.7"/>

  <g opacity="0.9">
    <line x1="10" y1="50" x2="54" y2="50" stroke="#ff2a6d" stroke-width="0.8" opacity="0.5"/>
    <line x1="10" y1="14" x2="40" y2="14" stroke="#00f0ff" stroke-width="0.8" opacity="0.4"/>
  </g>

  <g filter="url(#glow)">
    <text x="33.5" y="34" fill="#ff2a6d" font-family="'Arial Black', Impact, sans-serif" font-size="38" font-weight="900" text-anchor="middle" dominant-baseline="central" opacity="0.85">L</text>
    <text x="30.5" y="34" fill="#00f0ff" font-family="'Arial Black', Impact, sans-serif" font-size="38" font-weight="900" text-anchor="middle" dominant-baseline="central" opacity="0.9">L</text>
    <text x="32" y="34" fill="#f5f3ff" font-family="'Arial Black', Impact, sans-serif" font-size="38" font-weight="900" text-anchor="middle" dominant-baseline="central">L</text>
  </g>
</svg>
