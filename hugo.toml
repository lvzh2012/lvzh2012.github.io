# ===== 主题参数配置 =====
[params]
  # ===== 全站灰度模式配置 =====
  grayscaleMode = false                     # 全站变灰模式（一键开启，适用于特殊纪念日等场景）
  
  # ===== 基础信息配置 =====
  author = "LvZhenHua"                      # 网站作者/所有者
  description = "在0和1的世界里翱翔!"  # 网站描述，用于SEO
  
  # ===== 布局显示配置 =====
  homeColumns = 2             # 首页中间栏引擎：1=单列|2=双列|3=瀑布流
  mainSections = ["posts"]                 # 首页主内容来源的 Section 列表（驱动卡片列表）
  summaryLength = 84                      # 文章摘要截取长度(字符数)，用于列表摘要
  
  # ===== 文章卡片透明背景模式 =====
  postCardTransparentMode = true          # 启用文章卡片透明背景模式（true=透明效果，false=默认背景）
  postCardTransparentType = "glass"        # 透明效果类型：glass（透明毛玻璃效果）或 full（全透明效果）
  
  # ===== 文章详情页透明背景模式 =====
  postPageTransparentMode = false          # 启用文章详情页透明背景模式（true=透明效果，false=默认背景）
  postPageTransparentType = "glass"       # 透明效果类型：glass（透明毛玻璃效果）或 full（全透明效果）
  
  # ===== 功能开关配置 =====
  darkMode = true                          # 默认启用暗色模式，false为默认亮色
  tocOpen = false                           # 文章目录默认展开，false为默认折叠
  pjax = true                              # 启用无刷新页面切换，false为传统页面跳转
  stickyHeader = true                      # 页面下滑时导航栏固定在顶部，false为不固定
  
  # ===== 全站字体配置 =====
  [params.font]
    enable = false                         # 是否启用自定义字体（true=启用，false=使用系统默认字体）
    type = "local"                        # 字体类型：online（在线字体，如Google Fonts）或 local（本地字体）
    # 在线字体配置（type = "online" 时使用）
    onlineUrl = ""                         # 在线字体链接（如：https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap）
    fontFamily = ""                        # 字体名称（如：'Noto Sans SC', sans-serif）
    # 本地字体配置（type = "local" 时使用）
    localName = "字魂白鸽天行体"                         # 本地字体名称（用于font-family，如：'HarmonyOS Sans SC'）
    localPath = "/fonts/字魂白鸽天行体.ttf"                         # 本地字体文件路径（支持woff2/woff/ttf格式，如：/fonts/HarmonyOS-Sans-SC.woff2）
    localFormat = "ttf"                  # 本地字体格式：woff2、woff 或 ttf
  
  # ===== 开发者工具防护配置（保护代码安全） =====
  [params.devToolsProtection]
    enabled = false                        # 是否启用开发者工具防护（true=启用，false=禁用）
    disableRightClick = true               # 是否禁用右键菜单（true=禁用，false=允许）
    disableTextSelection = false           # 是否禁用文本选择（true=禁用，false=允许）
    detectDevTools = true                  # 是否检测开发者工具打开（true=检测，false=不检测）
    devToolsThreshold = 160                # 开发者工具检测阈值（像素），当窗口尺寸差异超过此值时认为开发者工具已打开
    disableConsole = false                 # 是否禁用控制台输出（true=禁用，false=允许）
    disableDebugger = false                # 是否使用debugger阻止调试（true=启用，false=禁用）
    preventIframe = true                   # 是否阻止通过iframe打开页面（true=阻止，false=允许）
    onDevToolsOpen = "none"                 # 检测到开发者工具打开时的行为：none（无操作）、redirect（跳转）、clear（清空页面）、close（尝试关闭）、debugger（使用debugger）
    redirectUrl = "/"                      # 当onDevToolsOpen为redirect时，跳转的URL
  
  # ===== 打赏按钮配置 =====
  [params.reward]
    enable = false                          # 是否启用打赏按钮
    buttonText = "☕ 感谢支持"              # 按钮显示文字
    title = "如果觉得文章有帮助，可以请我喝杯杯咖啡~"  # 打赏提示文字
    wechat = "/img/weixin.webp"    # 微信收款码图片URL
    alipay = "/img/zhifubao.jpg"    # 支付宝收款码图片URL
  
  # ===== 文章互动功能配置 =====
  [params.postActions]
    # 点赞功能
    [params.postActions.like]
      enable = true                        # 是否启用点赞功能
      icon = "fas fa-heart"                # 点赞图标（FontAwesome图标类名）
      text = "点赞"                        # 按钮文字
      likedText = "已赞"                   # 已点赞时的文字
    
    # 转发功能
    [params.postActions.share]
      enable = true                        # 是否启用转发功能
      icon = "fas fa-share-alt"            # 转发图标（FontAwesome图标类名）
      text = "分享"                        # 按钮文字
      
      # 转发平台配置（按顺序显示）
      # 支持的平台：微信、微博、QQ、复制链接，{ name = "Twitter", icon = "fab fa-twitter", color = "#1DA1F2", url = "https://twitter.com/intent/tweet?url={url}&text={title}" },
      #  { name = "Facebook", icon = "fab fa-facebook", color = "#1877F2", url = "https://www.facebook.com/sharer/sharer.php?u={url}" },
      #  { name = "微博", icon = "fab fa-weibo", color = "#E6162D", url = "https://service.weibo.com/share/share.php?url={url}&title={title}" },
      platforms = [
        { name = "微信", icon = "fab fa-weixin", color = "#07C160" },
        
        { name = "QQ", icon = "fab fa-qq", color = "#12B7F5", url = "https://connect.qq.com/widget/shareqq/index.html?url={url}&title={title}&summary={description}" },
        
        { name = "复制链接", icon = "fas fa-link", color = "#666666" }
      ]
  
  # ===== 视频支持配置 =====
  [params.video]
    enable = true                          # 是否启用视频嵌入功能（支持B站、抖音、YouTube等）
  
  # ===== 置顶文章样式配置 =====
  [params.pinned]
    # 置顶徽章图标和文字颜色配置
    iconColor = "#4CEC12"                  # 图标颜色（默认：#FFFFFF 白色）
    textColor = "#4CEC12"                  # 文字颜色（默认：#FFFFFF 白色）
    
    # 暗色模式颜色（可选，不配置则使用亮色模式的颜色）
    iconColorDark = "#4CEC12"              # 暗色模式图标颜色
    textColorDark = "#4CEC12"              # 暗色模式文字颜色
  
  # ===== 文章加密功能配置 =====
  [params.encryption]
    enable = true                          # 是否启用加密功能
    fullHint = "🔒 此文章已加密，请输入密码查看完整内容"  # 全文加密提示文字
    partialHint = "🔐 此部分内容已加密，请输入密码查看"     # 部分加密提示文字
    wrongPasswordHint = "❌ 密码错误，请重试"                # 密码错误提示文字
    
    # 全文加密弹窗样式配置
    popupTextColor = "#ffffff"             # 全文加密弹窗文字和图标颜色（默认白色）
    popupBackgroundColor = ""  # 全文加密弹窗背景色（支持单色或渐变，如："#667eea" 或 "linear-gradient(135deg, #667eea 0%, #764ba2 100%)"）
    popupBackgroundImage = "/img/bj.jpg"              # 全文加密弹窗背景图路径（留空则不使用背景图，如："/img/bg/encryption.jpg"）
    
    # 部分加密弹窗样式配置（独立设置，互不影响）
    partialPopupTextColor = "#ffffff"             # 部分加密弹窗文字和图标颜色（留空则使用默认主题色）
    partialPopupBackgroundColor = "linear-gradient(135deg, #667eea 0%, #764ba2 100%)"       # 部分加密弹窗背景色（支持单色或渐变，留空则使用默认背景）
    partialPopupBackgroundImage = ""       # 部分加密弹窗背景图路径（留空则不使用背景图）
  
  # ===== 轮播图配置 =====
  [params.carousel]
    enable = true                          # 是否启用轮播图功能
    height = 200                           # 轮播图高度(px)
    autoplay = true                        # 是否自动播放
    interval = 5000                        # 自动播放间隔(毫秒)
    direction = "horizontal"               # 切换方向：horizontal(左右) / vertical(上下)
    showOnPages = ["home"]                 # 显示页面：home(首页) / all(所有页面) / ["home", "posts"]
    transparentMode = false                 # 启用轮播图透明背景模式（true=透明效果，false=默认背景）
    transparentType = "full"              # 透明效果类型：glass（透明毛玻璃效果）或 full（全透明效果）
    
    # 注意：轮播项配置已移至 data/carousel.yaml 文件中
    # 如需修改轮播项，请编辑 data/carousel.yaml 文件
  
  # ===== 搜索模块配置 =====
  [params.search]
    engine = "local"                       # 搜索引擎：local（本地索引）/ algolia（预留）
    indexPath = "/index.json"              # 本地索引路径（需在 [outputs].home 启用 JSON）

  # ===== 侧边栏显示控制 =====
  [params.aside]
    # 侧栏一体化模式
    unifiedMode = false                 # 启用侧栏一体化模式（true=一体化，false=分割卡片）
    
    # 侧栏组件透明背景模式
    transparentMode = false             # 启用侧栏组件透明背景模式（true=透明毛玻璃效果，false=默认背景）
    
    # 侧栏组件宽度模式
    wideMode = "false"                   # 侧栏宽度模式：false或"normal"=260px（默认），"medium"=332px（中宽），true或"wide"=415px（超宽）
    
    # 左右栏模块顺序配置
    left  = ["author","announcement","visitor-info","life-time","recent-Comments","popular-Posts","advertisement"]
    right = ["toc","tags","social-Media","hitokoto","random-image","music","series-posts","related-Posts", "recent-Posts","categories", "archive","data-stats"]

    # 各组件显示开关（默认true表示不配置时默认显示）
    showAuthor = true                      # 作者信息卡片
    showToc = true                         # 目录组件
    showTags = true                        # 标签云
    showRecent = false                      # 最新文章
    showCategories = false                  # 分类组件
    showArchive = false                     # 归档组件
    showPopularPosts = false                # 热门文章
    showRelatedPosts = false                # 相关文章
    showSocialMedia = true                # 社交媒体
    showAdvertisement = false              # 广告位
    showAnnouncement = true                # 公告栏
    showLifeTime = false                    # 逆行人生时间倒计时组件
    showDataStats = false                   # 数据统计组件
    showHitokoto = true                   # 一言组件
    showVisitorInfo = false                 # 访客信息组件
    showRandomImage = false                 # 随机图片组件
    showMusic = false                       # 音乐组件

    # 作者组件配置
    [params.aside.author]
      enableBackground = false         # 是否启用背景图片/颜色
      backgroundImage = "/img/bj.jpg"                 # 背景图片URL（留空则不显示背景图）
      backgroundColor = ""                 # 背景色（留空则不显示背景色，支持渐变，例如："linear-gradient(135deg, #667eea 0%, #764ba2 100%)"）
      backgroundSize = "cover"             # 背景图片尺寸：cover（覆盖）| contain（包含）| auto（自动）
      backgroundPosition = "center"        # 背景图片位置：center | top | bottom | left | right
      backgroundRepeat = "no-repeat"       # 背景图片重复：no-repeat | repeat | repeat-x | repeat-y
      textColor = ""                       # 文字颜色（留空则使用默认颜色）
      textShadow = false                   # 是否为文字添加阴影（提高在背景图上的可读性）
      overlayColor = ""                    # 遮罩层颜色（在背景图上添加半透明遮罩，例如："rgba(0, 0, 0, 0.3)"）
      borderRadius = ""                    # 圆角大小（留空则使用默认圆角）

    # 公告组件配置
