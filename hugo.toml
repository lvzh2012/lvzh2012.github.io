# ===== Hugo Demius 主题配置文件 =====
# 本配置文件包含了 Demius 主题的所有功能配置
# 请根据您的需求修改相应的配置项

# ===== 站点基础配置 =====
baseURL = 'https://xying.space/'                 # 自定义域名（GitHub Pages）
languageCode = 'zh-CN'                     # 网站语言代码
title = "LVZHENHUA'S BLOG"                   # 网站标题
theme = 'demius'

# 忽略特定的日志警告
ignoreLogs = ['warning-goldmark-raw-html']

# ===== RSS订阅配置 =====
copyright = "Copyright © 2024-2025 Lv·Z·H"  # RSS版权信息
rssLimit = 20                              # RSS输出的最大文章数量

# ===== 分页配置 =====
[pagination]
  pagerSize = 12                            # 每页文章数量（单栏/双栏布局生效）

# ===== 多语言和区域设置 =====
defaultContentLanguage = 'zh'              # 默认内容语言
hasCJKLanguage = true                      # 启用中日韩语言支持，优化中文排版

# ===== 永久链接和分类配置 =====
# 配置文章永久链接规则，避免文章URL每次更新后都变化，导致SEO问题
[permalinks]
  posts = "/posts/:slug.html"              # 文章永久链接格式
[taxonomies]
  tag = "tags"                             # 标签分类名称
  category = "categories"                  # 分类名称

# ===== 输出格式配置 =====
[outputs]
  home = ["HTML", "RSS", "JSON"]           # 主页输出 HTML + RSS + JSON（RSS用于订阅，JSON用于本地搜索索引）

